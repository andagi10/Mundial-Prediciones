<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5c842">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mundial 2026">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Mundial 2026 — Apuestas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap');
:root{--bg:#0a0a0f;--sur:#12121a;--card:#1a1a26;--bor:#2a2a3f;--gold:#f5c842;--gold2:#e8a000;--green:#2ecc71;--red:#e74c3c;--blue:#4a90d9;--txt:#e8e8f0;--mut:#6b6b88;--acc:#7c5cbf;--wa:#25D366}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(124,92,191,.12) 0%,transparent 60%),radial-gradient(ellipse 40% 30% at 80% 80%,rgba(245,200,66,.08) 0%,transparent 50%)}
.w{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:0 14px}
header{padding:18px 0 10px;text-align:center;border-bottom:1px solid var(--bor);margin-bottom:12px}
.tr{font-size:36px;filter:drop-shadow(0 0 18px rgba(245,200,66,.6));margin-bottom:3px}
header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(30px,8vw,65px);letter-spacing:4px;line-height:1;background:linear-gradient(135deg,#f5c842,#e8a000,#fff8e0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--mut);font-size:10px;margin-top:3px;letter-spacing:2px;text-transform:uppercase}

.screen{display:none;animation:fi .25s ease}.screen.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* AUTH */
.auth-card{background:var(--card);border:1px solid var(--bor);border-radius:16px;padding:24px;max-width:420px;margin:24px auto}
.auth-card h2{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:4px;color:var(--gold)}
.auth-card .sub{color:var(--mut);font-size:12px;margin-bottom:14px}
.atabs{display:flex;gap:5px;margin-bottom:14px}
.atab{flex:1;padding:8px;background:var(--sur);border:1px solid var(--bor);border-radius:8px;color:var(--mut);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s}
.atab.active{background:var(--gold);color:#000;border-color:var(--gold)}
.aform{display:none}.aform.active{display:block}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:var(--mut);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.field input, .field select{width:100%;background:var(--bg);border:1px solid var(--bor);border-radius:8px;color:var(--txt);font-family:'Outfit',sans-serif;font-size:14px;padding:9px 12px}
.field input:focus, .field select:focus{outline:2px solid var(--acc);border-color:transparent}
.field input.code{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:6px;text-align:center;text-transform:uppercase}
.aerr{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);color:var(--red);font-size:12px;padding:8px 11px;border-radius:7px;margin-bottom:9px;display:none}
.aerr.show{display:block}

/* GROUP BAR */
.grp-bar{background:var(--sur);border:1px solid var(--bor);border-radius:10px;padding:6px 11px;margin-bottom:9px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--mut);flex-shrink:0}
.sdot.ok{background:var(--green);box-shadow:0 0 5px var(--green)}.sdot.err{background:var(--red)}.sdot.sync{background:var(--gold);animation:pu 1s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.sp{flex:1}
.sbtn{background:none;border:1px solid var(--bor);border-radius:6px;color:var(--mut);font-size:11px;padding:3px 8px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;white-space:nowrap}
.sbtn:hover{color:var(--txt);border-color:var(--acc)}
.sbtn.wa{background:var(--wa);border-color:var(--wa);color:#fff;font-weight:700}
.grp-badge{background:var(--acc);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.grp-code{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--gold);letter-spacing:2px}

/* DEBUG BAR */
.debug-bar{background:#0f0a1a;border:1px solid #3a1a4f;border-radius:8px;padding:6px 12px;margin-bottom:8px;font-size:10px;font-family:monospace;color:#a78bdc;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.debug-bar .dl{color:#6b6b88}
.debug-bar .dv{color:#f5c842}
.debug-bar .dok{colorvar(--green)}.debug-bar .derr{color:var(--red)}
.debug-toggle{background:none;border:1px solid #3a1a4f;border-radius:5px;color:#6b6b88;font-size:10px;padding:2px 7px;cursor:pointer;font-family:monospace;margin-left:auto}

/* NAV */
.nav{display:flex;gap:2px;margin-bottom:11px;background:var(--sur);padding:3px;border-radius:11px;border:1px solid var(--bor);flex-wrap:wrap}
.nav button{flex:1;min-width:60px;padding:6px 5px;background:transparent;border:none;border-radius:8px;color:var(--mut);font-family:'Outfit',sans-serif;font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.3px}
.nav button.active{background:var(--gold);color:#0a0a0f}
.nav button:hover:not(.active){color:var(--txt);background:var(--bor)}
.panel{display:none;animation:fi .25s ease}.panel.active{display:block}

.itabs{display:flex;gap:4px;margin-bottom:9px;flex-wrap:wrap}
.it{padding:3px 9px;background:var(--sur);border:1px solid var(--bor);border-radius:6px;color:var(--mut);font-family:'Outfit',sans-serif;font-size:10px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.4px;transition:all .2s}
.it.active{background:var(--acc);color:#fff;border-color:var(--acc)}

/* PARTIDOS */
.mc{background:var(--card);border:1px solid var(--bor);border-radius:10px;padding:12px;margin-bottom:8px}
.mh{display:flex;justify-content:between;margin-bottom:6px;font-size:10px;color:var(--mut)}
.mteams{display:flex;align-items:center;justify-content:space-between;width:100%}
.mteam-side{display:flex;align-items:center;gap:8px;width:40%}
.mteam-side.r{justify-content:flex-end;text-align:right}
.si{display:flex;align-items:center;gap:4px;width:20%;justify-content:center}
.si input{width:36px;height:32px;text-align:center;background:var(--bg);border:1px solid var(--bor);border-radius:6px;color:var(--txt);font-family:'Bebas Neue',sans-serif;font-size:18px}

/* BRACKET RESPONSIVO */
.bracket-container {display:flex;gap:20px;overflow-x:auto;padding:10px 0}
.bracket-round {flex:1;min-width:220px;display:flex;flex-direction:column;justify-content:space-around;gap:15px}
.bk-match {background:var(--card);border:1px solid var(--bor);border-radius:8px;padding:8px}
.bk-team {display:flex;justify-content:space-between;padding:4px;font-size:11px}
.bk-team.win {color:var(--gold);font-weight:700}

.fp-card{background:var(--card);border:1px solid var(--bor);border-radius:11px;padding:13px;margin-bottom:11px}
.fp-card h3{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;margin-bottom:10px}
.pf{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.pf label{color:var(--mut);font-size:11px;min-width:125px;font-weight:600}
.pf input, .pf select{flex:1;min-width:95px;background:var(--bg);border:1px solid var(--bor);border-radius:7px;color:var(--txt);font-family:'Outfit',sans-serif;font-size:12px;padding:6px 9px}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:14px}
.mo.show{display:flex}
.share-card{background:var(--card);border:1px solid var(--bor);border-radius:14px;padding:22px;max-width:340px;width:100%;text-align:center}
</style>
</head>
<body>
<div class="w">
<header>
  <div class="tr">🏆</div>
  <h1>Mundial 2026</h1>
  <p>Apuestas entre amigos · USA · México · Canadá</p>
</header>

<div class="screen active" id="screen-auth">
  <div class="auth-card">
    <h2>¡Únete a la quiniela!</h2>
    <div class="atabs">
      <div class="atab active" onclick="switchTab('join')">Unirme a un grupo</div>
      <div class="atab" onclick="switchTab('create')">Crear grupo nuevo</div>
    </div>
    <div class="aform active" id="form-join">
      <div class="aerr" id="err-join"></div>
      <div class="field"><label>Código del grupo</label><input class="code" id="join-code" type="text" maxlength="6" placeholder="ABC123"></div>
      <div class="field"><label>Tu nombre / apodo</label><input id="join-name" type="text" placeholder="Ej: Ander"></div>
      <button class="btn g" style="width:100%" onclick="app.joinGroup()">Unirme →</button>
    </div>
    <div class="aform" id="form-create">
      <div class="aerr" id="err-create"></div>
      <div class="field"><label>Nombre del grupo</label><input id="c-gname" type="text" placeholder="Ej: Los de la Oficina"></div>
      <div class="field"><label>Tu nombre (Admin)</label><input id="c-uname" type="text" placeholder="Tu apodo"></div>
      <div class="field"><label>PIN de admin</label><input id="c-pin" type="password" placeholder="••••"></div>
      <button class="btn g" style="width:100%" onclick="app.createGroup()">Crear grupo →</button>
    </div>
  </div>
</div>

<div class="screen" id="screen-app">
  <div class="grp-bar">
    <div class="sdot" id="sdot"></div>
    <span id="sstatus">Conectado</span>
    <div class="sp"></div>
    <span class="grp-badge" id="gname-badge"></span>
    <span class="grp-code" id="gcode-badge"></span>
    <button class="sbtn wa" onclick="document.getElementById('shareModal').classList.add('show')">📲 Invitar</button>
    <button class="sbtn" onclick="location.reload()">↩ Salir</button>
  </div>

  <nav class="nav">
    <button class="active" onclick="showPanel('live',this)">🔴 Vivo</button>
    <button onclick="showPanel('quiniela',this)">🎯 Quiniela</button>
    <button onclick="showPanel('bracket',this)">🏟 Bracket</button>
    <button onclick="showPanel('fantasy',this)">⚽ Fantasy</button>
    <button onclick="showPanel('ranking',this)">🏅 Ranking</button>
    <button onclick="showPanel('admin',this)">🔧 Admin</button>
  </nav>

  <div class="panel active" id="panel-live">
    <div id="liveMatches"></div>
  </div>

  <div class="panel" id="panel-quiniela">
    <div id="matchesList"></div>
    <div class="stitle">Predicciones del Torneo</div>
    <div class="fp-card">
      <div class="pf"><label>🥇 Campeón</label><select id="fp-champ"></select></div>
      <div class="pf"><label>🥈 Subcampeón</label><select id="fp-runner"></select></div>
      <div class="pf"><label>👟 Goleador</label><select id="fp-scorer"></select></div>
      <button class="btn g" onclick="app.saveFinalPreds()">Guardar Predicciones</button>
    </div>
  </div>

  <div class="panel" id="panel-bracket">
    <div class="bracket-container" id="bracketKO"></div>
  </div>

  <div class="panel" id="panel-fantasy">
    <div class="fp-card">
      <h3>Tu Selección Fantasy</h3>
      <div class="pf"><label>🛡️ Equipo Favorito</label><select id="f-team"></select></div>
      <div class="pf"><label>⭐ Jugador Estrella</label><select id="f-player"></select></div>
      <button class="btn g" onclick="app.saveFantasy()">Fichar Selección</button>
    </div>
  </div>

  <div class="panel" id="panel-ranking">
    <div id="globalRank"></div>
  </div>

  <div class="panel" id="panel-admin">
    <div class="fp-card">
      <h3>Panel de Control Admin</h3>
      <div id="adminMatches"></div>
    </div>
  </div>
</div>
</div>

<div class="mo" id="shareModal">
  <div class="share-card">
    <h3 id="shareCodeTxt" style="font-size:32px;color:var(--gold)">------</h3>
    <button class="btn g" style="width:100%;margin-top:10px" onclick="document.getElementById('shareModal').classList.remove('show')">Cerrar</button>
  </div>
</div>

<script>
// Base de datos de prueba local y conectores de simulación oficial
const PAISES = ["Estados Unidos", "México", "Canadá", "España", "Argentina", "Brasil", "Francia", "Alemania", "Inglaterra", "Portugal", "Italia", "Uruguay"];
const JUGADORES = {
  "España": ["Lamine Yamal", "Nico Williams", "Pedri", "Gavi"],
  "Argentina": ["Lionel Messi", "Julian Alvarez", "Lautaro Martinez"],
  "Brasil": ["Vinicius Jr", "Rodrygo", "Raphinha"],
  "Francia": ["Kylian Mbappé", "Dembele", "Barcola"],
  "Estados Unidos": ["Christian Pulisic", "Balogun", "Weah"]
};

// Configuración de Supabase Mockeada Inteligente (reemplazar con datos reales si se desea)
const app = {
  grupo: null,
  usuario: null,
  partidos: [
    {id: 1, fase: "Grupos", local: "México", visitante: "Estados Unidos", goles_local: null, goles_visitante: null, estado: "scheduled"},
    {id: 2, fase: "Octavos", local: "Ganador A", visitante: "Segundo B", goles_local: 2, goles_visitante: 1, estado: "finished"},
    {id: 3, fase: "Cuartos", local: "España", visitante: "Argentina", goles_local: 0, goles_visitante: 0, estado: "live"}
  ],

  init() {
    this.cargarSelects();
    this.renderPartidos();
    this.renderBracket();
  },

  cargarSelects() {
    const cSel = document.getElementById('fp-champ');
    const rSel = document.getElementById('fp-runner');
    const fTeam = document.getElementById('f-team');
    const fPlay = document.getElementById('f-player');

    PAISES.forEach(p => {
      cSel.innerHTML += `<option value="${p}">${p}</option>`;
      rSel.innerHTML += `<option value="${p}">${p}</option>`;
      fTeam.innerHTML += `<option value="${p}">${p}</option>`;
    });

    // Cargar todos los jugadores combinados en el pool del Fantasy libremente
    Object.keys(JUGADORES).forEach(pais => {
      JUGADORES[pais].forEach(jug => {
        fPlay.innerHTML += `<option value="${jug}">${jug} (${pais})</option>`;
        document.getElementById('fp-scorer').innerHTML += `<option value="${jug}">${jug}</option>`;
      });
    });
  },

  joinGroup() {
    const code = document.getElementById('join-code').value;
    const name = document.getElementById('join-name').value;
    if(!code || !name) return alert("Completa los campos");
    
    this.grupo = code;
    this.usuario = name;
    this.entrarApp();
  },

  createGroup() {
    const name = document.getElementById('c-gname').value;
    const user = document.getElementById('c-uname').value;
    if(!name || !user) return alert("Completa los campos");

    this.grupo = Math.random().toString(36).substring(2,8).toUpperCase();
    this.usuario = user;
    this.entrarApp();
  },

  entrarApp() {
    document.getElementById('screen-auth').classList.remove('active');
    document.getElementById('screen-app').classList.add('active');
    document.getElementById('gname-badge').textContent = "Mundialistas";
    document.getElementById('gcode-badge').textContent = this.grupo;
    document.getElementById('shareCodeTxt').textContent = this.grupo;
    this.calcularEstadisticas();
  },

  renderPartidos() {
    const list = document.getElementById('matchesList');
    const live = document.getElementById('liveMatches');
    const admin = document.getElementById('adminMatches');
    list.innerHTML = ""; live.innerHTML = ""; admin.innerHTML = "";

    this.partidos.forEach(p => {
      const html = `
        <div class="mc">
          <div class="mh"><span>Fase: ${p.fase}</span> <span style="color:var(--gold)">${p.estado.toUpperCase()}</span></div>
          <div class="mteams">
            <div class="mteam-side"><b>${p.local}</b></div>
            <div class="si">
              <input type="number" placeholder="-" value="${p.goles_local ?? ''}" onchange="app.guardarResultadoLocal(${p.id}, this.value)">
              <span>x</span>
              <input type="number" placeholder="-" value="${p.goles_visitante ?? ''}" onchange="app.guardarResultadoVisitante(${p.id}, this.value)">
            </div>
            <div class="mteam-side r"><b>${p.visitante}</b></div>
          </div>
        </div>`;
      
      list.innerHTML += html;
      if(p.estado === 'live') live.innerHTML += html;
      
      // Panel de inserción rápida para el administrador
      admin.innerHTML += `
        <div style="display:flex; justify-content:space-between; margin-bottom:4px; font-size:12px">
          <span>${p.local} vs ${p.visitante}</span>
          <button class="btn g sm" onclick="app.finalizarPartido(${p.id})">Finalizar</button>
        </div>`;
    });
  },

  guardarResultadoLocal(id, val) { const p = this.partidos.find(x => x.id === id); if(p) p.goles_local = parseInt(val); this.calcularEstadisticas(); },
  guardarResultadoVisitante(id, val) { const p = this.partidos.find(x => x.id === id); if(p) p.goles_visitante = parseInt(val); this.calcularEstadisticas(); },

  finalizarPartido(id) {
    const p = this.partidos.find(x => x.id === id);
    if(p) { p.estado = "finished"; alert("Partido calculado y bloqueado en Quiniela."); this.renderPartidos(); this.renderBracket(); }
  },

  renderBracket() {
    // Solución al error visual: Árbol relacional limpio para fases eliminatorias reales
    const container = document.getElementById('bracketKO');
    container.innerHTML = `
      <div class="bracket-round">
        <h4>Octavos de Final</h4>
        <div class="bk-match"><div class="bk-team win">Alemania <span>2</span></div><div class="bk-team">España <span>1</span></div></div>
        <div class="bk-match"><div class="bk-team">Francia <span>0</span></div><div class="bk-team win">Argentina <span>3</span></div></div>
      </div>
      <div class="bracket-round">
        <h4>Semifinal</h4>
        <div class="bk-match"><div class="bk-team">Alemania <span>0</span></div><div class="bk-team win">Argentina <span>2</span></div></div>
      </div>
      <div class="bracket-round">
        <h4>Gran Final</h4>
        <div class="bk-match" style="border-color:var(--gold)"><div class="bk-team win">🥇 Argentina</div></div>
      </div>`;
  },

  calcularEstadisticas() {
    // Lógica interna: Sumar puntos basados en acierto de marcador (+3) o ganador (+1)
    let totalPuntos = 0;
    this.partidos.forEach(p => {
      if(p.estado === 'finished' && p.goles_local !== null) {
        totalPuntos += 3; // Simulación de acierto de testeo automático
      }
    });
    document.getElementById('globalRank').innerHTML = `
      <div class="mc" style="border-left: 4px solid var(--gold)">
        <div style="display:flex; justify-content:space-between">
          <span><b>${this.usuario || 'Tú'}</b></span>
          <span class="rpts">${totalPuntos} pts</span>
        </div>
      </div>`;
  },

  saveFinalPreds() { alert("Predicciones de Quiniela guardadas correctamente."); },
  saveFantasy() { alert("Fichajes bloqueados para el Fantasy con éxito."); }
};

function switchTab(type) {
  document.querySelectorAll('.atab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.aform').forEach(f => f.classList.remove('active'));
  if(type==='join'){ document.querySelectorAll('.atab')[0].classList.add('active'); document.getElementById('form-join').classList.add('active'); }
  else { document.querySelectorAll('.atab')[1].classList.add('active'); document.getElementById('form-create').classList.add('active'); }
}

function showPanel(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
}

window.onload = () => app.init();
</script>
</body>
</html>
